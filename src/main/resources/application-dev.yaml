spring:
  application:
    name: Interceptor
  main:
    banner-mode: off

  # Interceptor's own database (for users, audit, blocked queries) - SSL enabled
  datasource:
    url: "jdbc:postgresql://localhost:5434/interceptor?ssl=true&sslmode=verify-ca&sslrootcert=./certs/ca.crt&sslkey=./certs/client.p12&sslpassword=changeit"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis configuration - TLS on port 6380
  data:
    redis:
      host: localhost
      port: 6380
      ssl:
        enabled: true
  # Spring security login credentials
  security:
    user:
      name: ${SECURITY_USERNAME}
      password: ${SECURITY_PASSWORD}

logging:
  level:
    com.proxy: debug

# Proxy configuration
proxy:
  listen-port: 5432          # Port where proxy listens
  target-host: localhost     # PostgreSQL target host
  target-port: 5433          # PostgreSQL target port
  block-by-default: true

  # Critical SQL keywords that require approval
  critical-keywords: DROP,ALTER,TRUNCATE,DELETE,GRANT,REVOKE,UPDATE,INSERT

  # Allowed keywords that bypass blocking
  allowed-keywords: SELECT,CREATE

  # SSL Configuration - TLSv1.3 with ECDSA certs
  ssl:
    enabled: true
    trust-store: ${TRUST_STORE}
    trust-store-password: ${TRUST_STORE_PASSWORD}
    client-key-store: ${CLIENT_KEY_STORE}
    client-key-store-password: ${CLIENT_KEY_STORE_PASSWORD}
    # Frontend: client -> proxy server identity presented to psql or other postgres client.
    server-key-store: ${PROXY_SERVER_KEY_STORE}
    server-key-store-password: ${PROXY_SERVER_KEY_STORE_PASSWORD}

# Admin dashboard - HTTPS with TLSv1.3
admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

server:
  port: 443
  ssl:
    enabled: true
    key-store: ${KEY_STORE}
    key-store-password: ${KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    protocol: TLS
    enabled-protocols: TLSv1.3
    ciphers: TLS_AES_256_GCM_SHA384

# JWT configuration
jwt:
  secret:  ${JWT_KEY}
  expiration: 86400000  # 24 hours in milliseconds

# Peer approval configuration
approval:
  peer-enabled: true
  min-votes: 2

# Audit log retention
audit:
  retention-days: 90

# ─── Dynamic Risk Scoring (DRS) ───
risk-scoring:
  enabled: true

  # Weights (must sum to 1.0)
  syntax-weight: 0.2
  data-weight: 0.4
  behavior-weight: 0.3
  context-weight: 0.1

  # Threshold function T(R) = ceil(min + (max - min) * R^gamma)
  min-approvals: 1
  max-approvals: 5
  gamma: 2.0

  # Syntax analysis coefficients
  depth-coefficient: 0.15
  join-coefficient: 0.2

  # Data sensitivity map (table/column name → sensitivity score)
  sensitivity-map:
    users: 0.8
    credentials: 1.0
    passwords: 1.0
    ssn: 1.0
    credit_card: 1.0
    payment: 0.9
    salary: 0.9
    accounts: 0.7
    orders: 0.3
    products: 0.1

  # Business hours (24h format, for time-of-day context scoring)
  business-hour-start: 9
  business-hour-end: 18

  # Trusted IP prefixes (score 0.0 for these)
  trusted-ip-prefixes: "10.","172.16.","192.168.","127."